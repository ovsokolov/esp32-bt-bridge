; ESP32 Classic Bluetooth A2DP sink / HFP HF / AVRCP CT for Adafruit ESP32 Feather V2.

[env:esp_a2dp_hf]
platform = espressif32
board = adafruit_feather_esp32_v2
framework = espidf

board_build.sdkconfig = sdkconfig.esp_a2dp_hf
board_build.partitions = partitions.csv
monitor_speed = 115200
monitor_port = /dev/cu.usbserial-575E0740741
upload_port = /dev/cu.usbserial-575E0740741
upload_speed = 460800

build_flags =
    -D SAMPLE_RATE=44100
    -D I2S_BCLK_GPIO=5
    -D I2S_WS_GPIO=25
    -D I2S_DOUT_GPIO=19
    -D RGB_LED_GPIO=0
    -D RGB_LED_POWER_GPIO=2
    -D BT_DEVICE_NAME=\"ESP-A2DP-HF\"
    -D BT_REMOTE_NAME=\"\"
